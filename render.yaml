services:
  - type: web
    name: hntrip-app
    runtime: node
    plan: free
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health/readiness
    envVars:
      - key: NODE_VERSION
        value: 22.19.0
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: APP_URL
        sync: false
